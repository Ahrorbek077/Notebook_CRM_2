{% load i18n %}
<form action="{% url 'set_language' %}" method="post" id="langForm">
    {% csrf_token %}
    <input name="next" type="hidden" value="{{ request.path }}">
    <div class="lang-switcher">
        <button type="submit" name="language" value="uz"
                class="lang-btn {% if LANGUAGE_CODE == 'uz' %}active{% endif %}">UZ</button>
        <button type="submit" name="language" value="uz-Cyrl"
                class="lang-btn {% if LANGUAGE_CODE == 'uz-Cyrl' %}active{% endif %}">ЎЗ</button>
        <button type="submit" name="language" value="ru"
                class="lang-btn {% if LANGUAGE_CODE == 'ru' %}active{% endif %}">RU</button>
    </div>
</form>
