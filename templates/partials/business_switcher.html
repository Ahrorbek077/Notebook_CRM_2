{% load i18n %}
{% if switchable_businesses %}
<div class="biz-switcher" style="position:relative;flex-shrink:0;">
    <button type="button" class="lang-btn biz-switch-btn" id="bizSwitchBtn">
        <i class="fa fa-building"></i>
        <span class="biz-switch-label" id="bizSwitchLabel">{{ current_business.name|default:"Biznes" }}</span>
        <i class="fa fa-caret-down"></i>
    </button>
    <div id="bizSwitchMenu" style="display:none;position:absolute;top:110%;right:0;background:#171c26;border:1px solid rgba(255,255,255,.08);border-radius:10px;min-width:180px;max-width:min(280px, calc(100vw - 24px));z-index:50;overflow:hidden;">
        {% for biz in switchable_businesses %}
        <button type="button" class="biz-switch-item" data-id="{{ biz.id }}"
            style="display:block;width:100%;text-align:left;padding:10px 14px;background:{% if current_business.id == biz.id %}rgba(0,230,118,.12){% else %}transparent{% endif %};border:none;color:#fff;cursor:pointer;white-space:normal;word-break:break-word;">
            {{ biz.name }}{% if current_business.id == biz.id %} <i class="fa fa-check" style="color:#00e676;"></i>{% endif %}
        </button>
        {% endfor %}
    </div>
</div>
<script>
(function () {
    const btn  = document.getElementById('bizSwitchBtn');
    const menu = document.getElementById('bizSwitchMenu');
    if (!btn) return;
    btn.addEventListener('click', () => {
        menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    });
    document.addEventListener('click', (e) => {
        if (!btn.contains(e.target) && !menu.contains(e.target)) menu.style.display = 'none';
    });
    document.querySelectorAll('.biz-switch-item').forEach(item => {
        item.addEventListener('click', () => {
            const id = item.dataset.id;
            fetch("{% url 'business:business_switch' %}", {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}',
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'business_id=' + encodeURIComponent(id),
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'switched') {
                    window.location.reload();
                }
            });
        });
    });
})();
</script>
{% endif %}
